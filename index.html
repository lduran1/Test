<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition Items</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .table-wrapper {
            display: flex;
            gap: 0;
            border: 1px solid #000000;
        }

        .column {
            flex: 1;
            border-right: 1px solid #000000;
        }

        .column:last-child {
            border-right: none;
        }

        .column.black {
            background-color: #000000;
            color: #ffffff;
        }

        .column.white {
            background-color: #ffffff;
            color: #000000;
        }

        .column-header {
            padding: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 1px solid;
            text-align: center;
        }

        .column.black .column-header {
            border-bottom-color: #ffffff;
        }

        .column.white .column-header {
            border-bottom-color: #000000;
        }

        .item {
            padding: 20px;
            border-bottom: 1px solid;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .column.black .item {
            border-bottom-color: #333333;
        }

        .column.white .item {
            border-bottom-color: #cccccc;
        }

        .item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Transition Items</h1>
        <div class="table-wrapper">
            <div class="column black">
                <div class="column-header">Column 1</div>
                <div class="item">Item 1</div>
                <div class="item">Item 2</div>
                <div class="item">Item 3</div>
                <div class="item">Item 4</div>
                <div class="item">Item 5</div>
            </div>
            <div class="column white">
                <div class="column-header">Column 2</div>
                <div class="item">Item 1</div>
                <div class="item">Item 2</div>
                <div class="item">Item 3</div>
                <div class="item">Item 4</div>
                <div class="item">Item 5</div>
            </div>
        </div>
    </div>
</body>
</html>
